<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura de Texto (OCR) - Azure AI</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
    
    <div class="contenido-pagina">
        <h1>Módulo: Lectura de Texto (OCR)</h1>

        <div class="contenedor-principal">
            <div class="columna-izquierda" style="flex: 1;"> 
                <label for="urlUsuario">Pega la URL de la imagen o PDF a escanear:</label><br><br>
                
                <div style="display: flex; align-items: center; gap: 20px; justify-content: space-between;">
                    <input type="text" id="urlUsuario" value="https://image.slidesharecdn.com/eleditorial-220301120619/95/El-editorial-3-638.jpg" style="flex: 1;">
                    
                    <div class="vista-previa">
                        <img id="imgPreview" src="https://image.slidesharecdn.com/eleditorial-220301120619/95/El-editorial-3-638.jpg" alt="Vista previa" style="max-width: 150px; max-height: 100px; border-radius: 8px; border: 1px solid #ccc; display: block;">
                    </div>
                </div>
            </div>
        </div>

        <div class="seccion-boton">
            <button id="btnEnviar">Escanear Texto</button>
        </div>

        <h3>Resultado de la IA</h3>
        <div id="resultado">Esperando imagen...</div>
    </div>

    <script src="./js/componentes.js"></script>
    <script src="./js/ocr.js"></script>
</body>
</html>
