<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Imagen - Azure AI</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>

    <div class="contenido-pagina">
        <h1>Módulo: Análisis de Imagen</h1>

        <div class="contenedor-principal">
            <div class="columna-izquierda" style="flex: 1;"> 
                <label for="urlUsuario">Pega la URL de la imagen a analizar:</label><br><br>
                <input type="text" id="urlUsuario" value="https://static.vecteezy.com/system/resources/thumbnails/079/131/527/small/thinking-woman-and-relax-with-coffee-at-house-for-peace-daydreaming-and-calm-morning-smile-female-person-and-caffeine-beverage-with-reflection-nostalgia-memory-and-perspective-for-weekend-break-photo.jpg">
                
                <br><br>
                <div class="vista-previa">
                    <img id="imgPreview" src="https://static.vecteezy.com/system/resources/thumbnails/079/131/527/small/thinking-woman-and-relax-with-coffee-at-house-for-peace-daydreaming-and-calm-morning-smile-female-person-and-caffeine-beverage-with-reflection-nostalgia-memory-and-perspective-for-weekend-break-photo.jpg" alt="Vista previa" style="max-width: 100%; max-height: 100px; border-radius: 8px; border: 1px solid #ccc;">
                </div>
            </div>
        </div>

        <div class="seccion-boton">
            <button id="btnEnviar">Analizar Imagen</button>
        </div>

        <h3>Resultado de la IA</h3>
        <div id="resultado">
            <p class="mensaje-estado">Esperando imagen para analizar...</p>
        </div>
    </div>

    <script src="./js/componentes.js"></script>
    <script src="./js/imagen.js"></script>
</body>
</html>
